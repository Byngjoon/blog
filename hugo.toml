baseURL = 'https://Byngjoon.github.io/blog/'
locale = 'ko-KR'
title = 'Learning-Log'
theme = 'PaperMod'
[pagination]
  pagerSize = 10

[params]
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  math = true
  ShowToc = true
  TocOpen = false
  TocSide = "right"

[params.assets]
  customCSS = ["css/custom.css"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 2

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 3
